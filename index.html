<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идей для постов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --ink: #1c1917;
      --ink-soft: #57534e;
      --surface: rgba(255, 255, 255, 0.92);
      --row: rgba(255, 255, 255, 0.65);
      --row-hover: rgba(255, 255, 255, 0.95);
      --border: rgba(120, 113, 108, 0.12);
      --shadow-card: 0 4px 6px -1px rgba(41, 37, 36, 0.06),
        0 24px 48px -12px rgba(41, 37, 36, 0.12);
      --shadow-row: 0 1px 2px rgba(41, 37, 36, 0.04);
      --shadow-row-hover: 0 8px 24px -6px rgba(41, 37, 36, 0.1);
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      background: linear-gradient(
        145deg,
        #faf8f5 0%,
        #f0f4f8 42%,
        #e8eef6 72%,
        #f5f2ef 100%
      );
      background-attachment: fixed;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(1.25rem, 4vw, 2.5rem);
    }

    .card {
      width: 100%;
      max-width: 28rem;
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: clamp(1.25rem, 3vw, 1.75rem);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-card);
      padding: clamp(1.75rem, 5vw, 2.5rem) clamp(1.5rem, 4vw, 2.25rem);
    }

    .card h1 {
      margin: 0 0 clamp(1.5rem, 4vw, 2rem);
      font-size: clamp(1.625rem, 5.2vw, 2.125rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      color: var(--ink);
    }

    .list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: clamp(0.625rem, 2vw, 0.875rem);
    }

    .list li {
      margin: 0;
      padding: clamp(0.875rem, 2.5vw, 1.125rem) clamp(1rem, 3vw, 1.25rem);
      background: var(--row);
      border: 1px solid var(--border);
      border-radius: clamp(0.75rem, 2vw, 1rem);
      box-shadow: var(--shadow-row);
      font-size: clamp(0.9375rem, 2.8vw, 1rem);
      font-weight: 600;
      color: var(--ink-soft);
      transition: transform 0.22s ease, box-shadow 0.22s ease,
        background 0.22s ease, color 0.22s ease, border-color 0.22s ease;
    }

    .list li:hover {
      transform: translateY(-2px);
      background: var(--row-hover);
      color: var(--ink);
      border-color: rgba(120, 113, 108, 0.18);
      box-shadow: var(--shadow-row-hover);
    }

    @media (prefers-reduced-motion: reduce) {
      .list li {
        transition: none;
      }
      .list li:hover {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="card">
      <h1>Генератор идей для постов</h1>
      <ul class="list">
        <li>5 идей постов для экспертов</li>
        <li>3 идеи сторис на сегодня</li>
        <li>контент план на неделю</li>
      </ul>
    </main>
  </div>
</body>
</html>
